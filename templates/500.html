{% extends 'base.html' %}
{% block title %}Server Error — F2 Hotel{% endblock %}
{% block content %}
<section style="min-height:75vh; background:var(--off-white); display:flex; align-items:center;">
  <div class="container text-center py-5">
    <div style="font-family:var(--font-display); font-size:clamp(6rem,18vw,12rem); font-weight:700; line-height:1; color:#dc3545; opacity:0.2;">500</div>
    <h2 class="font-display fw-700 mt-n3 mb-3" style="margin-top:-2rem;">Something Went Wrong</h2>
    <p class="text-muted mb-4 mx-auto" style="max-width:400px;">
      We're experiencing a technical issue. Our team has been notified. Please try again shortly.
    </p>
    <div class="d-flex flex-wrap justify-content-center gap-3">
      <a href="{% url 'website:home' %}" class="btn btn-gold btn-lg px-4">
        <i class="fas fa-home me-2"></i> Back to Home
      </a>
      <a href="{% url 'website:contact' %}" class="btn btn-outline-dark btn-lg px-4">
        <i class="fas fa-headset me-2"></i> Contact Support
      </a>
    </div>
  </div>
</section>
{% endblock %}
